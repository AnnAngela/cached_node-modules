name: linter

on:
  push:
    paths:
      - src/**/*
      - .*.yaml
      - eslint.config.js
      - .github/workflows/linter.yaml
      - package.json
      - package-lock.json
      - vitest.config.ts
  merge_group:
  pull_request:
    paths:
      - src/**/*
      - .*.yaml
      - eslint.config.js
      - .github/workflows/linter.yaml
      - package.json
      - package-lock.json
      - vitest.config.ts
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  actions: write
  checks: read
  contents: write
  deployments: read
  issues: write
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: write
  statuses: write

jobs:
  linter_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true
          cache: npm

      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@v5
        with:
          command: npm run ci

      - name: Check environment
        run: npx eslint --env-info
      - name: Run eslint
        run: npm run lint:check-ci
      - name: Run tests
        run: npm run test
      - name: Test packaging
        run: npm run package
      - name: Verify build output
        run: node --input-type=module -e "await import('./dist/index.js'); console.log('Build OK')"
      - name: Upload build metafile
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: esbuild-metafiles
          path: .cache/*-meta.json
