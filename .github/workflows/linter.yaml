name: linter

on:
  push:
    paths:
      - src/**/*
      - .*.yaml
      - eslint.config.js
      - .github/workflows/linter.yaml
      - package.json
      - package-lock.json
      - vitest.config.ts
  merge_group:
  pull_request:
    paths:
      - src/**/*
      - .*.yaml
      - eslint.config.js
      - .github/workflows/linter.yaml
      - package.json
      - package-lock.json
      - vitest.config.ts
  workflow_dispatch:
  schedule:
    - cron: 0 23 * * * # Every 07:00 CST

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}

permissions:
  contents: read
  actions: write

jobs:
  linter_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          show-progress: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          check-latest: true
          cache: npm

      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@f5225ef90d81f9dff57a66c7da631e718a540b9e # v5
        with:
          command: npm run ci

      - name: Check environment
        run: npx eslint --env-info
      - name: Run eslint
        run: npm run lint:check-ci
      - name: Run tests
        run: npm run test
      - name: Test packaging
        run: npm run package
      - name: Verify build output
        run: |
          node --check ./dist/index.js && echo "dist/index.js is valid JavaScript."
          node --check ./dist/post.js && echo "dist/post.js is valid JavaScript."
      - name: Upload build metafile
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: esbuild-metafiles
          path: .cache/*-meta.json
