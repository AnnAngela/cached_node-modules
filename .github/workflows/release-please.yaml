name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      # manifest 模式：不设 release-type 输入，让 release-please 读取 release-please-config.json。
      # skip-github-release: 只维护 Release PR（bump package.json + CHANGELOG），不建 tag、不建 GitHub Release——
      # 后者交由 publish.yaml 在 Release PR 合并后完成，以便把 dist 构建产物纳入 tag。
      #
      # 历史背景：v6.0.0 tag 曾指向 detached 的 dist commit（不在 master 历史链上），release-please 无法沿
      # 历史回溯，故曾在 config 用 bootstrap-sha/last-release-sha=fed92867（master 链上的 6.0.0 release commit）
      # 作一次性过渡引导。自 v6.0.1 起，publish.yaml 的 release.js 已把 dist commit 接入 master（updateRef
      # heads/master fast-forward），版本 tag 即在 master 历史链上，release-please 可正常沿 manifest 版本
      # → tag 回溯，两键已从 config 移除。last-release-sha 是 release-please 文档标注的"应避免"逃生舱，会在
      # 回溯循环里截断、与 manifest 版本回溯竞争，tag 回溯正常后保留有污染 changelog 的风险，故不再使用。
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          skip-github-release: true
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
