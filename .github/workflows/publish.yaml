name: publish

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - package.json
      - .github/workflows/publish.yaml

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHA_BOT_GIT_NAME: github-actions[bot]
  GHA_BOT_GIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

permissions:
  contents: write
  actions: write

jobs:
  # 轻量预检 job：仅判断 package.json 的 version 是否相对最近 tag 发生变化。
  # release-please 合并 Release PR 会让 version 递增；dependabot 改依赖行时 version 不变 → 跳过。
  # 通过 needs 依赖让 publish job 整体跳过，避免 runner 拉起重步骤，消除空跑。
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.ver.outputs.changed }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          show-progress: false
      - name: Check if version changed
        id: ver
        run: |
          set -euo pipefail
          # version 来自 package.json，非未受信输入。
          CUR=$(node -p "require('./package.json').version")
          # 只匹配精确版本 tag（vX.Y.Z），排除滚动 major tag（如 v6）和预发布 tag（如 v6.0.0-rc1）——
          # 前者会被 git describe 误取，使 LAST 变成 "6" 而非 "6.0.0"，导致 CUR != LAST 恒成立、误触发；
          # 后者使 LAST 指向预发布版本，与稳定 version 比较恒不等、误触发。
          # grep -v -- '-' 排除含连字符的预发布 tag；--sort=-v:refname 按 semver 倒序，head -1 取最新精确版本 tag。
          LAST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname 2>/dev/null | grep -v -- '-' | head -1 | sed 's/^v//' || true)
          echo "current version: $CUR, last tag version: ${LAST:-none}"
          if [ -n "$CUR" ] && [ "$CUR" != "$LAST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CUR" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          show-progress: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          check-latest: true
          cache: npm

      - name: Installing the dependencies
        uses: AnnAngela/cached_node-modules@8336d5acec06f1670b1097dc0b424527a8481659 # v6.0.0
        with:
          command: npm run ci

      - name: Check environment
        run: npx eslint --env-info
      - name: Run eslint
        run: npm run lint:check-ci
      - name: Run tests
        run: npm test

      - name: Run package
        run: npm run package
      - name: Verify build output
        run: |
          node --check ./dist/index.js && echo "dist/index.js is valid JavaScript."
          node --check ./dist/post.js && echo "dist/post.js is valid JavaScript."

      # 经 GitHub git database API 创建含 dist 的 Verified commit + annotated tag + GitHub Release + 滚动 major tag。
      # version 通过 env 注入脚本，避免 workflow injection。
      - name: Release via GitHub API
        env:
          RELEASE_VERSION: ${{ needs.check.outputs.version }}
        run: node scripts/release.js
